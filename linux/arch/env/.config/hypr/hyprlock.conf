general {
    hide_cursor        = true
    ignore_empty_input = false
    immediate_render   = true
    fail_timeout       = 4000
}

background {
    monitor          =
    path             = $HOME/.config/rofi/.current_wallpaper
    color            = rgba(3, 5, 17, 1.0)
    blur_passes      = 1
    blur_size        = 5
    noise            = 0.0117
    contrast         = 0.8916
    brightness       = 0.8172
    vibrancy         = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor          =
    size             = 300, 60
    outline_thickness = 3
    dots_size        = 0.33
    dots_spacing     = 0.15
    dots_center      = true
    outer_color      = rgba(53, 80, 153, 1.0)
    inner_color      = rgba(3, 5, 17, 1.0)
    font_color       = rgba(173, 190, 221, 1.0)
    fade_on_empty    = true
    placeholder_text = <i>Password...</i>
    hide_input       = false
    position         = 0, 80
    halign           = center
    valign           = bottom
}

label {
    monitor          =
    text             = cmd[update:1000] echo "$(date +"%H:%M")"
    color            = rgba(173, 190, 221, 1.0)
    font_size        = 96
    font_family      = Fira Code Medium
    position         = 0, -40
    halign           = center
    valign           = center
}

label {
    monitor          =
    text             = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color            = rgba(245, 141, 111, 1.0)
    font_size        = 20
    font_family      = Fira Code Medium
    position         = 0, -130
    halign           = center
    valign           = center
}
