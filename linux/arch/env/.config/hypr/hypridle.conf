general {
    lock_cmd         = pidof hyprlock || (loginctl lock-session; sleep 1; ~/.config/hypr/scripts/hyprlock-watchdog.sh)
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = ~/.config/hypr/scripts/after-sleep.sh
    inhibit_sleep    = 3
}

listener {
    timeout          = 300
    on-timeout       = hyprctl dispatch dpms off
    on-resume        = hyprctl dispatch dpms on
}

listener {
    timeout          = 900
    on-timeout       = pidof hyprlock || ~/.config/hypr/scripts/hyprlock-watchdog.sh
}

listener {
    timeout          = 2700
    on-timeout       = systemctl suspend
}
